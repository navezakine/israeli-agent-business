# Railway / Nixpacks build config (repo root).
# Deploy from the REPO ROOT (do NOT set a Railway "Root Directory") so the
# clients/ vault folder ships alongside the agent-brain code.

[phases.install]
cmds = ["npm install --prefix packages/agent-brain"]

[phases.build]
cmds = ["npm run build --prefix packages/agent-brain"]

[start]
cmd = "node packages/agent-brain/dist/index.js"
